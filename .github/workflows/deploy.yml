name: Deploy knowledge constellation to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz engine
        run: git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git .quartz-engine

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: ./.quartz-engine

      - name: Sync vault into Quartz
        run: node scripts/sync-quartz.mjs

      - name: Build Quartz site
        run: npx quartz build
        working-directory: ./.quartz-engine

      - name: Ensure GitHub Pages bypasses Jekyll
        run: touch ./.quartz-engine/public/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.quartz-engine/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
